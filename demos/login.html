<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XiaoP Liquid Glass - 登录页演示</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../dist/liquid-glass.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .page-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
        }
        .page-bg-color {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--lg-bg-gradient-1), var(--lg-bg-gradient-2), var(--lg-bg-gradient-3), var(--lg-bg-gradient-4));
            background-size: 400% 400%;
            animation: lgGradientShift 15s ease infinite;
        }
        .page-bg-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(0, 122, 255, 0.15), transparent 70%),
                        radial-gradient(ellipse at 70% 50%, rgba(139, 92, 246, 0.15), transparent 70%);
        }
        .login-card {
            width: 100%; max-width: 420px;
            background: var(--lg-card-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: var(--lg-radius-xl);
            border: 1px solid var(--lg-card-border);
            box-shadow: var(--lg-card-shadow);
            overflow: hidden;
            position: relative; z-index: 1;
        }
        .login-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.12), transparent);
            border-radius: inherit; pointer-events: none;
        }
        .login-header {
            padding: 36px 32px 24px;
            text-align: center;
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.3), rgba(139, 92, 246, 0.3));
            border-bottom: 1px solid var(--lg-divider);
        }
        .login-header .logo {
            width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--lg-primary), var(--lg-secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #fff;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
        }
        .login-header h1 { font-size: 22px; color: var(--lg-text-primary); margin-bottom: 6px; }
        .login-header p { color: var(--lg-text-secondary); font-size: 14px; }
        .login-body { padding: 28px 32px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; margin-bottom: 8px; color: var(--lg-text-primary); font-weight: 600; font-size: 13px; }
        .form-control {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--lg-input-border); border-radius: var(--lg-radius-sm);
            font-size: 14px; background: var(--lg-input-bg);
            backdrop-filter: blur(10px); color: var(--lg-text-primary);
            transition: var(--lg-transition-fast);
        }
        .form-control:focus {
            outline: none; border-color: var(--lg-input-focus-border);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1), var(--lg-glass-inner-highlight);
            background: var(--lg-glass-hover);
        }
        .form-control::placeholder { color: var(--lg-text-tertiary); }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--lg-text-tertiary); font-size: 16px; }
        .input-group .form-control { padding-left: 42px; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 13px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; color: var(--lg-text-secondary); cursor: pointer; }
        .checkbox-label input { accent-color: var(--lg-primary); }
        .forgot-link { color: var(--lg-primary); text-decoration: none; font-weight: 500; }
        .forgot-link:hover { text-decoration: underline; }
        .btn {
            display: block; width: 100%; padding: 14px;
            background: var(--lg-btn-primary-bg); backdrop-filter: blur(10px);
            color: #fff; border: 1px solid var(--lg-btn-primary-border);
            border-radius: var(--lg-radius-sm); font-size: 15px; font-weight: 600;
            cursor: pointer; box-shadow: var(--lg-btn-primary-shadow);
            transition: var(--lg-transition); position: relative; overflow: hidden;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 122, 255, 0.4); filter: brightness(1.1); }
        .btn::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
            border-radius: inherit; pointer-events: none;
        }
        .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; color: var(--lg-text-tertiary); font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--lg-divider); }
        .social-btns { display: flex; gap: 12px; }
        .social-btn {
            flex: 1; padding: 12px; border-radius: var(--lg-radius-sm);
            background: var(--lg-btn-ghost-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--lg-btn-ghost-border); color: var(--lg-text-primary);
            cursor: pointer; transition: var(--lg-transition-fast); font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { background: var(--lg-glass-hover); transform: translateY(-1px); }
        .login-footer { text-align: center; padding: 20px 32px 28px; color: var(--lg-text-secondary); font-size: 13px; border-top: 1px solid var(--lg-divider); }
        .login-footer a { color: var(--lg-primary); text-decoration: none; font-weight: 600; }
        .login-footer a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .login-header { padding: 28px 24px 20px; }
            .login-body { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="page-bg">
        <div class="page-bg-color"></div>
        <div class="page-bg-overlay"></div>
    </div>

    <div class="login-card glass-entrance">
        <div class="login-header">
            <div class="logo"><i class="bi bi-droplet-fill"></i></div>
            <h1>Welcome Back</h1>
            <p>Sign in to continue your journey</p>
        </div>
        <div class="login-body">
            <form onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" placeholder="Enter your password">
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <div class="divider">or continue with</div>
            <div class="social-btns">
                <button class="social-btn"><i class="bi bi-google"></i></button>
                <button class="social-btn"><i class="bi bi-apple"></i></button>
                <button class="social-btn"><i class="bi bi-github"></i></button>
            </div>
        </div>
        <div class="login-footer">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>

    <script src="../dist/liquid-glass.js"></script>
</body>
</html>
