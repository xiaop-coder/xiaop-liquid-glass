<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>XiaoP Liquid Glass - 现代化下拉选择</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { color-scheme: light dark; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
         min-height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative; overflow-x: hidden; padding: 60px 20px;
        }
        .animated-background {
            width: 100%; height: 100%;
            background-image: url('https://haowallpaper.com/link/common/file/previewFileImg/18347150586858880');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            position: fixed; top: 0; left: 0; z-index: -1;
        }
        .container { max-width: 1100px; width: 100%; position: relative; z-index: 1; }
        .page-header { text-align: center; margin-bottom: 56px; }
        .page-header h1 {
            font-size: 48px; color: #fff; margin-bottom: 16px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        .page-header h1 i {
            background: linear-gradient(135deg, #007aff, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 52px;
        }
        .page-header p { color: rgba(255,255,255,0.85); font-size: 20px; }
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px;
        }
        .demo-card {
         position: relative; border-radius: 24px; overflow: hidden;
            box-shadow: 0 4px 24px 0 rgba(0,0,0,0.10), 0 1.5px 6px 0 rgba(0,0,0,0.08);
            background: transparent; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .demo-card:hover { transform: translateY(-6px); }
        .glass-effect {
     position: absolute; inset: 0; z-index: 0;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            filter: url(#glass-distortion); isolation: isolate; border-radius: 24px;
        }
        .glass-tint {
            position: absolute; inset: 0; z-index: 1;
            background: rgba(0, 0, 0, 0.15); border-radius: 24px;
        }
        .glass-shine {
            position: absolute; inset: 0; z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.13); border-radius: 24px;
            box-shadow: inset 1px 1px 8px 0 rgba(255, 255, 255, 0.18),
                        inset -1px -1px 8px 0 rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }
        .glass-content { position: relative; z-index: 3; color: white; padding: 36px 32px; }
        .card-title {
            font-size: 22px; color: #fff; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px;
        }
        .card-title i {
     background: linear-gradient(135deg, #007aff, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .card-desc {
            color: rgba(255,255,255,0.7); font-size: 14px;
            margin-bottom: 28px; line-height: 1.6;
        }
        .select-group { margin-bottom: 24px; }
        .select-group:last-child { margin-bottom: 0; }
        .select-label {
       display: block; margin-bottom: 10px;
          color: rgba(255,255,255,0.9); font-weight: 600; font-size: 14px;
        }

        /* 现代化下拉框样式 */
        select {
            --_select-space: 12px;
            --_select-space-xs: 8px;
            --_select-picker-r: 16px;
            --_select-option-r: 10px;
            --_select-icon-size: 18px;
            --_select-max-h: min(400px, 80dvh);
            --_select-scale-open: 1.02;
            --_select-scale-press: 0.98;

            font: inherit; border-radius: var(--_select-option-r);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 0.2);
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
          padding: var(--_select-space) var(--_select-space);
            will-change: transform, box-shadow, border-color;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%; min-height: 48px; cursor: pointer;
            color: #fff; font-size: 15px;
        }

        @supports (-webkit-touch-callout: none) {
            select { font-size: 16px; }
        }

        @media (hover) and (pointer: fine) {
            select, select::picker(select) { appearance: base-select; }
            select:open {
                transform: scale(var(--_select-scale-open)) translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
            border-color: rgba(0, 122, 255, 0.6);
             background: rgba(255, 255, 255, 0.18);
            }
            select:hover {
                background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            }
       select:active { transform: scale(var(--_select-scale-press)); }
        }

        select:focus {
            outline: none;
          border-color: rgba(0, 122, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.2);
        }
        select:focus-visible {
            outline: 2px solid rgba(0, 122, 255, 0.8);
            outline-offset: 2px;
        }
        select:disabled {
            opacity: 0.5; cursor: not-allowed;
            background: rgba(255, 255, 255, 0.05);
        }

        /* 下拉面板 */
        select::picker(select) {
          max-height: var(--_select-max-h);
            border-radius: var(--_select-picker-r);
       border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 12px 48px rgba(0,0,0,0.4);
            padding: var(--_select-space-xs);
            animation: selectFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 选项 */
        select option {
            padding: var(--_select-space) var(--_select-space);
            border-radius: var(--_select-option-r);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 2px 0; color: rgba(255, 255, 255, 0.9);
        }
        select option:hover {
          background: rgba(255, 255, 255, 0.1);
            transform: translateX(8px); color: #fff;
        }
        select option:checked {
            background: rgba(0, 122, 255, 0.3);
            color: #64a0ff; font-weight: 600;
        }

        /* 箭头 */
        select::picker-icon {
            width: var(--_select-icon-size);
            height: var(--_select-icon-size);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        select:hover::picker-icon {
            color: rgba(255, 255, 255, 0.9);
            transform: rotate(180deg);
        }
        select:open::picker-icon {
          color: #64a0ff; transform: rotate(180deg);
        }

        /* 选中标记 */
        select option:checked::checkmark {
            color: #64a0ff; font-size: 16px;
            animation: checkmarkPop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 滚动条 */
        select::picker(select)::-webkit-scrollbar { width: 6px; }
     select::picker(select)::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); border-radius: 3px;
        }
        select::picker(select)::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3); border-radius: 3px;
        }
        select::picker(select)::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        @keyframes selectFadeIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes checkmarkPop {
            0% { transform: scale(0); opacity: 0; }
          50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 尺寸变体 */
        .select-sm { min-height: 40px; font-size: 14px; --_select-space: 10px; }
        .select-lg { min-height: 56px; font-size: 17px; --_select-space: 16px; }

        /* 背景切换器 */
        .bg-switcher { position: fixed; top: 16px; right: 16px; z-index: 1000; }
        .bg-switcher-btn {
            width: 40px; height: 40px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.25);
          backdrop-filter: blur(12px); color: #fff; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
     .bg-switcher-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.08); }
        .bg-panel {
            position: fixed; top: 68px; right: 16px; z-index: 999;
     width: 320px; padding: 20px; border-radius: 18px;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            color: #fff; display: none;
      }
        .bg-panel.show { display: block; }
        .bg-panel h4 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
        .bg-panel label { font-size: 12px; opacity: 0.7; display: block; margin-bottom: 6px; }
        .bg-url-row { display: flex; gap: 8px; margin-bottom: 14px; }
        .bg-url-input {
            flex: 1; padding: 8px 12px; border-radius: 10px;
            border: 1px solid rgba(255,255,0.2); background: rgba(255,255,255,0.1);
            color: #fff; font-size: 13px; outline: none;
        }
        .bg-apply-btn {
            padding: 8px 14px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.2); color: #fff;
         font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .bg-upload-area {
            border: 2px dashed rgba(255,255,255,0.25); border-radius: 12px;
        padding: 20px; text-align: center; cursor: pointer; margin-bottom: 14px;
        }
        .bg-upload-area .upload-icon { font-size: 28px; margin-bottom: 6px; }
        .bg-upload-area .upload-text { font-size: 12px; opacity: 0.6; }
        .bg-presets { display: flex; gap: 8px; flex-wrap: wrap; }
        .bg-preset {
          width: 52px; height: 36px; border-radius: 8px;
            border: 2px solid transparent; cursor: pointer;
            background-size: cover; background-position: center;
        }
        .bg-preset:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.5); }
        .bg-preset.active { border-color: #64a0ff; }
        .bg-reset {
            margin-top: 12px; padding: 6px 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2); background: transparent;
         color: rgba(255,255,255,0.7); font-size: 12px; cursor: pointer; width: 100%;
        }
        #bgFileInput { display: none; }

        @media (max-width: 768px) {
            .page-header h1 { font-size: 36px; }
        .cards-grid { grid-template-columns: 1fr; }
        .glass-content { padding: 28px 24px; }
        }
    </style>
</head>
<body>
  <div class="bg-switcher">
        <button class="bg-switcher-btn" id="bgToggleBtn" title="切换背景">🖼</button>
    </div>
    <div class="bg-panel" id="bgPanel">
        <h4>切换背景</h4>
        <label>图片直连地址</label>
        <div class="bg-url-row">
            <input type="text" class="bg-url-input" id="bgUrlInput" placeholder="粘贴图片URL...">
            <button class="bg-apply-btn" id="bgApplyBtn">应用</button>
      </div>
        <label>上传本地图片</label>
        <div class="bg-upload-area" id="bgUploadArea">
          <div class="upload-icon">📁</div>
        <div class="upload-text">点击或拖拽图片到此处</div>
        </div>
        <input type="file" id="bgFileInput" accept="image/*">
        <label>预设背景</label>
        <div class="bg-presets" id="bgPresets"></div>
        <button class="bg-reset" id="bgResetBtn">恢复默认背景</button>
    </div>

    <div class="animated-background"></div>

    <svg style="display: none">
        <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
            <feTurbulence type="fractalNoise" baseFrequency="0.001 0.005" numOctaves="1" seed="17" result="turbulence" />
          <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap" />
            <feDisplacementMap in="SourceGraphic" in2="softMap" scale="200" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="container">
        <div class="page-header">
            <h1><i class="bi bi-menu-button-wide-fill"></i>现代化下拉选择</h1>
          <p>Modern Dropdown with Liquid Glass Effect</p>
        </div>

        <div class="cards-grid">
        <div class="demo-card">
          <div class="glass-effect"></div>
                <div class="glass-tint"></div>
        <div class="glass-shine"></div>
                <div class="glass-content">
            <h2 class="card-title"><i class="bi bi-translate"></i>选择语言</h2>
               <p class="card-desc">流畅的动画效果，悬停时箭头旋转，选项滑入</p>
                 <div class="select-group">
                     <label class="select-label">Language / 语言</label>
                <select>
                      <option value="">请选择...</option>
                       <option value="zh">简体中文 - Chinese</option>
                            <option value="en">English - 英语</option>
                      <option value="ja">日本語 - Japanese</option>
                     <option value="ko">한국어 - Korean</option>
                            <option value="fr">Français - French</option>
                        </select>
              </div>
          </div>
            </div>

            <div class="demo-card">
           <div class="glass-effect"></div>
            <div class="glass-tint"></div>
                <div class="glass-shine"></div>
                <div class="glass-content">
               <h2 class="card-title"><i class="bi bi-globe"></i>选择国家</h2>
                <p class="card-desc">支持emoji图标，选中项带有对勾标记</p>
                    <div class="select-group">
                        <label class="select-label">Country / Region</label>
                   <select>
            <option value="">请选择...</option>
                      <option value="cn">🇨🇳 中国 China</option>
                    <option value="us">🇺🇸 美国 United States</option>
               <option value="jp">🇯🇵 日本 Japan</option>
                 <option value="kr">🇰🇷 韩国 South Korea</option>
                         <option value="uk">🇬🇧 英国 United Kingdom</option>
                       <option value="de">🇩🇪 德国 Germany</option>
                            <option value="fr">🇫🇷 法国 France</option>
                       <option value="ca">🇨🇦 加拿大 Canada</option>
             </select>
             </div>
         </div>
            </div>

            <div class="demo-card">
                <div class="glass-effect"></div>
          <div class="glass-tint"></div>
                <div class="glass-shine"></div>
                <div class="glass-content">
              <h2 class="card-title"><i class="bi bi-palette"></i>不同尺寸</h2>
                  <p class="card-desc">提供小、中、大三种尺寸选择</p>
                <div class="select-group">
         <label class="select-label">小尺寸 Small</label>
                  <select class="select-sm">
                <option value="red">🔴 红色 Red</option>
                          <option value="blue">🔵 蓝色 Blue</option>
                    <option value="green">🟢 绿色 Green</option>
               <option value="yellow">🟡 黄色 Yellow</option>
                     </select>
               </div>
                    <div class="select-group">
               <label class="select-label">大尺寸 Large</label>
                    <select class="select-lg">
                       <option value="developer">💻 开发工程师</option>
                 <option value="designer">🎨 UI/UX 设计师</option>
                            <option value="manager">📊 产品经理</option>
                            <option value="student">📚 学生</option>
         </select>
                    </div>
                </div>
        </div>
        </div>
    </div>

    <script>
    (function() {
        var bgEl = document.querySelector('.animated-background');
        var defaultBg = "url('https://haowallpaper.com/link/common/file/previewFileImg/18347150586858880')";
        var presets = [
            'https://haowallpaper.com/link/common/file/previewFileImg/18347150586858880',
            'https://plus.unsplash.com/premium_photo-1748960861503-99b1f5412a81?w=900&auto=format&fit=crop&q=60',
            'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=900&auto=format&fit=crop&q=60',
          'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=900&auto=format&fit=crop&q=60'
        ];

     var presetsContainer = document.getElementById('bgPresets');
        presets.forEach(function(url, i) {
            var div = document.createElement('div');
        div.className = 'bg-preset' + (i === 0 ? ' active' : '');
            div.style.backgroundImage = 'url(' + url + ')';
          div.addEventListener('click', function() {
            setBackground(url);
           document.querySelectorAll('.bg-preset').forEach(function(p) { p.classList.remove('active'); });
      div.classList.add('active');
            });
            presetsContainer.appendChild(div);
      });

        function setBackground(url) {
            bgEl.style.backgroundImage = 'url(' + url + ')';
        try { localStorage.setItem('lg-bg', url); } catch(e) {}
        }

        var saved = localStorage.getItem('lg-bg');
        if (saved) setBackground(saved);

        document.getElementById('bgToggleBtn').addEventListener('click', function() {
            document.getElementById('bgPanel').classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            var panel = document.getElementById('bgPanel');
            var btn = document.getElementById('bgToggleBtn');
        if (!panel.contains(e.target) && !btn.contains(e.target)) {
         panel.classList.remove('show');
            }
        });

        document.getElementById('bgApplyBtn').addEventListener('click', function() {
            var url = document.getElementById('bgUrlInput').value.trim();
            if (url) {
             setBackground(url);
                document.querySelectorAll('.bg-preset').forEach(function(p) { p.classList.remove('active'); });
            }
        });

        var uploadArea = document.getElementById('bgUploadArea');
        var fileInput = document.getElementById('bgFileInput');
        uploadArea.addEventListener('click', function() { fileInput.click(); });
        fileInput.addEventListener('change', function() {
            if (fileInput.files.length > 0) {
         var file = fileInput.files[0];
              if (file.type.startsWith('image/')) {
                  var reader = new FileReader();
                    reader.onload = function(e) {
                      setBackground(e.target.result);
              document.querySelectorAll('.bg-preset').forEach(function(p) { p.classList.remove('active'); });
              };
            reader.readAsDataURL(file);
                }
            }
        });

        document.getElementById('bgResetBtn').addEventListener('click', function() {
            bgEl.style.backgroundImage = defaultBg;
            try { localStorage.removeItem('lg-bg'); } catch(e) {}
            document.querySelectorAll('.bg-preset').forEach(function(p, i) {
                p.classList.toggle('active', i === 0);
            });
        });
  })();
    </script>
</body>
</html>
